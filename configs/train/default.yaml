# Default training configuration for multi-modal action recognition

# Model configuration
model:
  model_name: "multimodal_action_recognition"
  num_classes: 10
  hidden_dim: 512
  num_heads: 8
  num_layers: 6
  dropout: 0.1
  
  # Video encoder
  video_encoder: "timesformer"  # timesformer, video_swin, clip
  video_input_size: 224
  video_patch_size: 16
  video_num_frames: 16
  video_temporal_stride: 4
  
  # Audio encoder
  audio_encoder: "wav2vec2"  # wav2vec2, mel_spectrogram, mfcc
  audio_sample_rate: 16000
  audio_max_length: 160000  # 10 seconds at 16kHz
  audio_n_mels: 80
  audio_n_fft: 1024
  audio_hop_length: 512
  
  # Fusion strategy
  fusion_strategy: "cross_attention"  # early, late, cross_attention
  fusion_dim: 512
  
  # Pretrained models
  pretrained_video_model: "facebook/timesformer-base-finetuned-k400"
  pretrained_audio_model: "facebook/wav2vec2-base-960h"

# Data configuration
data:
  data_root: "data/raw"
  processed_data_root: "data/processed"
  annotations_file: "annotations.json"
  
  # Dataset splits
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  
  # Data augmentation
  video_augmentation: true
  audio_augmentation: true
  
  # Video preprocessing
  video_resize: [224, 224]
  video_normalize_mean: [0.485, 0.456, 0.406]
  video_normalize_std: [0.229, 0.224, 0.225]
  
  # Audio preprocessing
  audio_normalize: true
  audio_noise_factor: 0.01
  
  # Data loading
  batch_size: 8
  num_workers: 4
  pin_memory: true
  shuffle: true

# Training configuration
training:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.00001
  warmup_epochs: 5
  
  # Optimization
  optimizer: "adamw"  # adam, adamw, sgd
  scheduler: "cosine"  # cosine, linear, step
  gradient_clip_val: 1.0
  
  # Mixed precision
  use_amp: true
  
  # Checkpointing
  save_every_n_epochs: 10
  save_top_k: 3
  monitor_metric: "val_accuracy"
  mode: "max"
  
  # Early stopping
  early_stopping_patience: 15
  
  # Logging
  log_every_n_steps: 50
  val_check_interval: 1.0

# Evaluation configuration
evaluation:
  metrics: ["accuracy", "top5_accuracy", "precision", "recall", "f1", "confusion_matrix"]
  temporal_iou_thresholds: [0.1, 0.3, 0.5, 0.7]
  save_predictions: true
  save_attention_maps: true
  num_samples_to_visualize: 10

# Demo configuration
demo:
  demo_type: "streamlit"  # streamlit, gradio
  host: "0.0.0.0"
  port: 8501
  model_path: "checkpoints/best_model.ckpt"
  device: "auto"  # auto, cpu, cuda, mps
  max_video_duration: 30  # seconds
  max_audio_duration: 30  # seconds
  supported_video_formats: [".mp4", ".avi", ".mov"]
  supported_audio_formats: [".wav", ".mp3", ".flac"]
  enable_safety_filters: true
  max_file_size_mb: 100

# Global settings
seed: 42
device: "auto"  # auto, cpu, cuda, mps
num_gpus: 1
precision: 16  # 16, 32

# Logging
log_dir: "logs"
experiment_name: "multimodal_action_recognition"
use_wandb: false
wandb_project: "multimodal-action-recognition"

# Reproducibility
deterministic: true
benchmark: false
